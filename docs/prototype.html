document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>{{ icPlay }}<\u002Fspan>Double with a rewarded ad<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;textDark&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#DCE6FF&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;textLight&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#1B2559&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#6D7DFF&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  _nid = 0;\n  _anim = {};\n  _start = null;\n  KEY = 'fuse-mvp-volt-v1';\n\n  constructor(...args){\n    super(...args);\n    this.state = this.load();\n  }\n\n  load(){\n    let saved = null;\n    try { const raw = localStorage.getItem(this.KEY); if (raw) saved = JSON.parse(raw); } catch(e){}\n    if (saved && saved.classic){ this._nid = saved._nid || 1000; }\n    const base = {\n      screen:'home', overlay:null, dark:true, active:'classic',\n      classicBest: 5128, streak: 7, tick: 0,\n      settings:{ sound:true, haptics:true, reduced:false, cb:false },\n      classic: null, daily: null\n    };\n    const st = Object.assign(base, saved || {});\n    if (!st.classic) st.classic = this.newGameState();\n    if (!st.daily) st.daily = this.newDaily();\n    return st;\n  }\n  save(){ try { localStorage.setItem(this.KEY, JSON.stringify({ ...this.state, _nid:this._nid })); } catch(e){} }\n\n  // ---- day / seed ----\n  dayNum(){ return Math.floor((Date.now() - Date.UTC(2025,0,1)) / 86400000); }\n  dailySeed(){ return 20250101 + this.dayNum(); }\n  mulberry32(a){ return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }\n\n  newGameState(){ const tiles=[]; this.spawnInto(tiles); this.spawnInto(tiles); return { tiles, score:0, won:false, wonSeen:false, over:false, shake:false, moves:0 }; }\n  newDaily(){ const rnd=this.mulberry32(this.dailySeed()); const tiles=[]; this.spawnInto(tiles,rnd); this.spawnInto(tiles,rnd); return { tiles, score:0, won:false, wonSeen:false, over:false, shake:false, moves:0 }; }\n\n  spawnInto(tiles, rnd){\n    rnd = rnd || Math.random;\n    const occ = new Set(tiles.map(t=>t.r*4+t.c));\n    const empty=[]; for(let i=0;i<16;i++) if(!occ.has(i)) empty.push(i);\n    if(!empty.length) return;\n    const cell = empty[Math.floor(rnd()*empty.length)];\n    const val = rnd()<0.9 ? 2 : 4;\n    tiles.push({ id:++this._nid, r:Math.floor(cell/4), c:cell%4, val, isNew:true, pop:false });\n  }\n\n  componentDidMount(){\n    this._key = (e)=>{\n      const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};\n      const dir=m[e.key];\n      const playing = (this.state.screen==='classic'||this.state.screen==='daily') && !this.state.overlay;\n      if(dir && playing){ e.preventDefault(); this.move(this.state.active,dir); }\n    };\n    window.addEventListener('keydown', this._key);\n    this._timer = setInterval(()=>this.setState(st=>({tick:st.tick+1})), 1000);\n  }\n  componentWillUnmount(){ window.removeEventListener('keydown', this._key); clearInterval(this._timer); }\n\n  lines(dir){\n    const L=[];\n    if(dir==='left'){ for(let r=0;r<4;r++) L.push([{r,c:0},{r,c:1},{r,c:2},{r,c:3}]); }\n    else if(dir==='right'){ for(let r=0;r<4;r++) L.push([{r,c:3},{r,c:2},{r,c:1},{r,c:0}]); }\n    else if(dir==='up'){ for(let c=0;c<4;c++) L.push([{r:0,c},{r:1,c},{r:2,c},{r:3,c}]); }\n    else { for(let c=0;c<4;c++) L.push([{r:3,c},{r:2,c},{r:1,c},{r:0,c}]); }\n    return L;\n  }\n  anyMove(tiles){\n    const g=[[null,null,null,null],[null,null,null,null],[null,null,null,null],[null,null,null,null]];\n    tiles.forEach(t=>{g[t.r][t.c]=t;});\n    for(let r=0;r<4;r++) for(let c=0;c<4;c++){\n      if(!g[r][c]) return true;\n      if(c<3 && g[r][c+1] && g[r][c+1].val===g[r][c].val) return true;\n      if(r<3 && g[r+1][c] && g[r+1][c].val===g[r][c].val) return true;\n    }\n    return false;\n  }\n  shake(which){\n    this.setState(st=>({[which]:{...st[which],shake:true}}));\n    setTimeout(()=>this.setState(st=>({[which]:{...st[which],shake:false}})),240);\n  }\n\n  move(which,dir){\n    if(this._anim[which]) return;\n    const g=this.state[which];\n    if(g.over) return;\n    const grid=[[null,null,null,null],[null,null,null,null],[null,null,null,null],[null,null,null,null]];\n    g.tiles.forEach(t=>{grid[t.r][t.c]=t;});\n    const newPos={}, removed={}, created=[];\n    let moved=false, gained=0, madeWin=false;\n    this.lines(dir).forEach(line=>{\n      const seq=[]; line.forEach(p=>{const t=grid[p.r][p.c]; if(t)seq.push(t);});\n      let i=0,out=0;\n      while(i<seq.length){\n        const cell=line[out];\n        if(i+1<seq.length && seq[i].val===seq[i+1].val){\n          newPos[seq[i].id]={r:cell.r,c:cell.c}; newPos[seq[i+1].id]={r:cell.r,c:cell.c};\n          removed[seq[i].id]=1; removed[seq[i+1].id]=1;\n          const nv=seq[i].val*2; gained+=nv; if(nv>=2048) madeWin=true;\n          created.push({id:++this._nid,r:cell.r,c:cell.c,val:nv,pop:true,isNew:false});\n          moved=true; i+=2;\n        } else {\n          newPos[seq[i].id]={r:cell.r,c:cell.c};\n          if(seq[i].r!==cell.r||seq[i].c!==cell.c) moved=true;\n          i+=1;\n        }\n        out++;\n      }\n    });\n    if(!moved){ this.shake(which); return; }\n    this._anim[which]=true;\n    const phase1=g.tiles.map(t=>({...t,r:newPos[t.id].r,c:newPos[t.id].c,isNew:false,pop:false}));\n    this.setState(st=>({[which]:{...st[which],tiles:phase1}}));\n    setTimeout(()=>{\n      let tiles=phase1.filter(t=>!removed[t.id]).map(t=>({...t,pop:false,isNew:false}));\n      created.forEach(c=>tiles.push({...c}));\n      this.spawnInto(tiles);\n      const over=!this.anyMove(tiles);\n      this.setState(st=>{\n        const score=st[which].score+gained;\n        const won=st[which].won||madeWin;\n        const justWon = madeWin && !st[which].won;\n        const patch={ [which]:{...st[which], tiles, score, won, over, moves:(st[which].moves||0)+1} };\n        if(which==='classic') patch.classicBest=Math.max(st.classicBest,score);\n        if(justWon) patch.overlay='win';\n        else if(over) patch.overlay='gameover';\n        return patch;\n      },()=>this.save());\n      this._anim[which]=false;\n    },115);\n  }\n\n  revive(){\n    const which=this.state.active;\n    this.setState(st=>{\n      const g=st[which];\n      const sorted=[...g.tiles].sort((a,b)=>a.val-b.val);\n      const remove=new Set(sorted.slice(0,Math.min(4,sorted.length-1)).map(t=>t.id));\n      const tiles=g.tiles.filter(t=>!remove.has(t.id));\n      return { [which]:{...g, tiles, over:false}, overlay:null };\n    },()=>this.save());\n  }\n  playAgain(){ const which=this.state.active; const fresh=which==='daily'?this.newDaily():this.newGameState(); this.setState({[which]:fresh, overlay:null},()=>this.save()); }\n  keepGoing(){ const which=this.state.active; this.setState(st=>({[which]:{...st[which],wonSeen:true}, overlay:null})); }\n  restartClassic(){ this.setState({classic:this.newGameState(), overlay:null},()=>this.save()); }\n\n  down(which,e){ this.setState({active:which}); this._start={x:e.clientX,y:e.clientY}; }\n  up(which,e){\n    if(!this._start) return;\n    const dx=e.clientX-this._start.x, dy=e.clientY-this._start.y; this._start=null;\n    if(Math.max(Math.abs(dx),Math.abs(dy))<22) return;\n    const dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');\n    this.move(which,dir);\n  }\n\n  // ---- navigation ----\n  go(screen){ this.setState({screen, overlay:null, active: (screen==='daily'?'daily':(screen==='classic'?'classic':this.state.active))},()=>this.save()); }\n  ovl(name, screen){ this.setState(st=>({overlay:name, screen:screen||st.screen, active:(screen==='daily'?'daily':(screen==='classic'?'classic':st.active))})); }\n  closeOvl(){ this.setState({overlay:null}); }\n  toggleDark(){ this.setState(st=>({dark:!st.dark}),()=>this.save()); }\n  tg(key){ this.setState(st=>({settings:{...st.settings,[key]:!st.settings[key]}}),()=>this.save()); }\n\n  // ---- theme ----\n  theme(){\n    const d=this.state.dark;\n    const p=this.props||{};\n    const text = d ? (p.textDark || '#DCE6FF') : (p.textLight || '#1B2559');\n    const accent = p.accent || (d ? '#6D7DFF' : '#5B6EF5');\n    return d ? {\n      bg:'#0A0E26', card:'#141A38', card2:'#1E2750', navBg:'rgba(10,14,38,.85)', line:'rgba(255,255,255,.08)',\n      text, sub:'#8A97D6', accent, accentSoft:'#1E2750', good:'#34F5C5', gold:'#FACC15'\n    } : {\n      bg:'#EEF2FF', card:'#FFFFFF', card2:'#E9EEFF', navBg:'rgba(255,255,255,.9)', line:'rgba(20,30,80,.09)',\n      text, sub:'#6B7BB5', accent, accentSoft:'#E7ECFF', good:'#0FB99A', gold:'#E8A800'\n    };\n  }\n  voltColor(val){\n    const M={2:{bg:'#D7E6FF',fg:'#1E3A8A'},4:{bg:'#AFCBFF',fg:'#1E3A8A'},8:{bg:'#5B9DFF',fg:'#fff'},16:{bg:'#3B82F6',fg:'#fff'},32:{bg:'#22D3EE',fg:'#06324A'},64:{bg:'#14B8A6',fg:'#fff'},128:{bg:'#8B5CF6',fg:'#fff'},256:{bg:'#A855F7',fg:'#fff'},512:{bg:'#D946EF',fg:'#fff'},1024:{bg:'#EC4899',fg:'#fff'},2048:{bg:'#34F5C5',fg:'#06324A',glow:'0 0 0 3px rgba(52,245,197,.3),0 0 30px rgba(52,245,197,.8)'}};\n    return M[val] || {bg:'#06324A',fg:'#34F5C5'};\n  }\n\n  renderBoard(which){\n    const t=this.theme();\n    const g=this.state[which];\n    const pad=12, cell=72, gap=11, size=pad*2+4*cell+3*gap;\n    const boardBg = this.state.dark ? '#141A38' : '#DCE7FF';\n    const cellBg = this.state.dark ? '#1E2750' : '#EDF3FF';\n    const reduced = this.state.settings.reduced;\n    const cells=[];\n    for(let i=0;i<16;i++) cells.push(React.createElement('div',{key:'c'+i,style:{borderRadius:14,background:cellBg}}));\n    const grid=React.createElement('div',{key:'grid',style:{position:'absolute',top:pad,left:pad,right:pad,bottom:pad,display:'grid',gridTemplateColumns:`repeat(4,${cell}px)`,gridAutoRows:`${cell}px`,gap:gap+'px'}},cells);\n    const tiles=(g.tiles||[]).map(t2=>{\n      const col=this.voltColor(t2.val);\n      const digits=String(t2.val).length;\n      const fs= digits<=2?34:digits===3?28:23;\n      let anim;\n      if(!reduced) anim = t2.pop?'fuse-pop 170ms ease':(t2.isNew?'fuse-spawn 150ms ease':undefined);\n      return React.createElement('div',{key:t2.id,style:{\n        position:'absolute',width:cell,height:cell,left:pad,top:pad,\n        transform:`translate(${t2.c*(cell+gap)}px,${t2.r*(cell+gap)}px)`,\n        transition: reduced?'none':'transform 110ms cubic-bezier(.2,.7,.3,1)',\n        display:'flex',alignItems:'center',justifyContent:'center',\n        borderRadius:14,fontFamily:\"'Space Grotesk',system-ui\",fontWeight:700,fontSize:fs,\n        background:col.bg,color:col.fg,boxShadow:col.glow||'0 4px 16px rgba(0,0,0,.28)',\n        zIndex:t2.pop?3:(t2.isNew?2:1),animation:anim\n      }},t2.val);\n    });\n    return React.createElement('div',{\n      onPointerDown:e=>this.down(which,e), onPointerUp:e=>this.up(which,e),\n      style:{position:'relative',width:size,height:size,borderRadius:22,background:boardBg,touchAction:'none',userSelect:'none',cursor:'grab',animation:(g.shake&&!reduced)?'fuse-shake 230ms ease':undefined}\n    },grid,...tiles);\n  }\n\n  // ---- icons (currentColor) ----\n  sg(children, opt){ opt=opt||{}; return React.createElement('svg',{width:opt.size||24,height:opt.size||24,viewBox:'0 0 24 24',fill:opt.fill?'currentColor':'none',stroke:opt.fill?'none':'currentColor',strokeWidth:opt.sw||2,strokeLinecap:'round',strokeLinejoin:'round',style:{display:'block'}}, children); }\n  pp(d,k){ return React.createElement('path',{key:k||d.slice(0,6),d}); }\n  icons(){\n    return {\n      icBolt: this.sg([this.pp('M13 2L5 13h5l-1 9 9-12h-6l1-8z')],{fill:true,size:22}),\n      icHome: this.sg([this.pp('M3 10l9-7 9 7','a'),this.pp('M5 9v11h14V9','b')],{size:23}),\n      icBag:  this.sg([this.pp('M6 7h12l1 13H5z','a'),this.pp('M9 7a3 3 0 0 1 6 0','b')],{size:23}),\n      icSkins:this.sg([this.pp('M4 4h7v7H4z','a'),this.pp('M13 4h7v7h-7z','b'),this.pp('M4 13h7v7H4z','c'),this.pp('M13 13h7v7h-7z','d')],{fill:true,size:21}),\n      icChart:this.sg([this.pp('M5 20V11','a'),this.pp('M12 20V4','b'),this.pp('M19 20v-6','c')],{sw:2.4,size:23}),\n      icGear: this.sg([this.pp('M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z','a'),this.pp('M19.4 13a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V20a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-2.7-1.1l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4.6 13H4a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.1-2.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 11 4.6V4a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0 1.1 2.7H20a2 2 0 1 1 0 4z','b')],{size:20}),\n      icBack: this.sg([this.pp('M15 18l-6-6 6-6')],{sw:2.4,size:22}),\n      icFlame:this.sg([this.pp('M12 3c1.5 3 4 4 4 7a4 4 0 0 1-8 0c0-1.5.8-2.6 1.6-3.1.1 1.4 1 2.1 1.4 2.3C12 8.5 11.5 5.5 12 3z')],{fill:true,size:15}),\n      icPlay: this.sg([this.pp('M8 5v14l11-7z')],{fill:true,size:18}),\n      icShare:this.sg([this.pp('M16 6l-4-4-4 4','a'),this.pp('M12 2v13','b'),this.pp('M5 12v8h14v-8','c')],{size:18}),\n      icClose:this.sg([this.pp('M6 6l12 12','a'),this.pp('M18 6L6 18','b')],{sw:2.2,size:18}),\n      icChevron:this.sg([this.pp('M9 6l6 6-6 6')],{sw:2.2,size:18}),\n      icReset:this.sg([this.pp('M3 12a9 9 0 1 0 3-6.7','a'),this.pp('M3 4v4h4','b')],{sw:2,size:20}),\n      icGift: this.sg([this.pp('M4 11h16v9H4z','a'),this.pp('M4 7h16v4H4z','b'),this.pp('M12 7v13','c'),this.pp('M12 7C9 7 8 3 12 3c4 0 3 4 0 4z','d')],{sw:1.8,size:19}),\n      icArrowUp:this.sg([this.pp('M12 20V5','a'),this.pp('M5 12l7-7 7 7','b')],{sw:2.6,size:40}),\n    };\n  }\n\n  // ---- share grid ----\n  shareGrid(){\n    const sample=[8,16,4,2, 32,64,8,4, 128,256,16,2, 512,32,4,0];\n    const sq=sample.map((v,i)=>{\n      const c = v? this.voltColor(v) : {bg: this.state.dark?'#1E2750':'#DDE5FB'};\n      return React.createElement('div',{key:i,style:{width:34,height:34,borderRadius:8,background:c.bg}});\n    });\n    return React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,34px)',gap:7}},sq);\n  }\n\n  fmtCountdown(){\n    const now=new Date();\n    const next=Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()+1,0,0,0);\n    let s=Math.max(0,Math.floor((next-now.getTime())/1000));\n    const h=String(Math.floor(s/3600)).padStart(2,'0'); s%=3600;\n    const m=String(Math.floor(s/60)).padStart(2,'0');\n    const ss=String(s%60).padStart(2,'0');\n    return `${h}:${m}:${ss}`;\n  }\n  swObj(on){ const t=this.theme(); return { track: on? t.accent : (this.state.dark?'rgba(255,255,255,.16)':'#cfd6ee'), x: on?20:2 }; }\n\n  renderVals(){\n    const st=this.state, t=this.theme(), s=st.settings;\n    const ic=this.icons();\n    const active=st[st.active]||st.classic;\n    const tabScreens=['home','store','coll','stats'];\n    const nc=(name)=> st.screen===name && !st.overlay ? t.accent : t.sub;\n    return Object.assign({\n      t, themeLabel: st.dark?'Dark':'Light',\n      scrHome: st.screen==='home', scrClassic: st.screen==='classic', scrDaily: st.screen==='daily',\n      scrStore: st.screen==='store', scrColl: st.screen==='coll', scrStats: st.screen==='stats', scrSettings: st.screen==='settings',\n      showTabs: tabScreens.includes(st.screen),\n      nav: { home:nc('home'), store:nc('store'), coll:nc('coll'), stats:nc('stats') },\n      ovlOver: st.overlay==='gameover', ovlWin: st.overlay==='win', ovlShare: st.overlay==='share',\n      ovlFtue: st.overlay==='ftue', ovlReward: st.overlay==='reward',\n      boardClassic: this.renderBoard('classic'), boardDaily: this.renderBoard('daily'),\n      cScore: st.classic.score, classicBest: st.classicBest,\n      dScore: st.daily.score, dMoves: st.daily.moves,\n      goScore: active.score,\n      dayNum: this.dayNum(), streak: st.streak, countdown: this.fmtCountdown(),\n      shareGrid: this.shareGrid(),\n      sw: { sound:this.swObj(s.sound), haptics:this.swObj(s.haptics), reduced:this.swObj(s.reduced), cb:this.swObj(s.cb), dark:this.swObj(st.dark) },\n      // nav handlers\n      jHome:()=>this.go('home'), jClassic:()=>this.go('classic'), jDaily:()=>this.go('daily'),\n      jStore:()=>this.go('store'), jColl:()=>this.go('coll'), jStats:()=>this.go('stats'), jSettings:()=>this.go('settings'),\n      jOver:()=>this.ovl('gameover','classic'), jWin:()=>this.ovl('win','classic'), jShare:()=>this.ovl('share'),\n      jFtue:()=>this.ovl('ftue','classic'), jReward:()=>this.ovl('reward','home'),\n      closeOvl:()=>this.closeOvl(),\n      revive:()=>this.revive(), playAgain:()=>this.playAgain(), keepGoing:()=>this.keepGoing(), restartClassic:()=>this.restartClassic(),\n      toggleDark:()=>this.toggleDark(),\n      tgSound:()=>this.tg('sound'), tgHaptics:()=>this.tg('haptics'), tgReduced:()=>this.tg('reduced'), tgCb:()=>this.tg('cb'),\n    }, ic);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
