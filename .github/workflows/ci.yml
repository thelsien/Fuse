name: CI

# Story FND-2 — CI pipeline.
# A pull request triggers build + lint + unit tests for BOTH Android and iOS
# targets. A red job fails its check; once the two checks below are marked
# "required" in branch protection, a red build blocks merge (see note at bottom).
#
# Critical constraints baked in (learned from FND-1):
#   * JDK 17 is mandatory — AGP 8.9.3 does NOT work on JDK 25. Every job pins
#     Temurin 17 via actions/setup-java.
#   * No local.properties is committed (gitignored). ANDROID_HOME must be present;
#     ubuntu-latest ships the Android SDK and exports ANDROID_HOME, and the macOS
#     runner gets it via android-actions/setup-android so xcodebuild's
#     "Compile Kotlin Framework" run script (which shells to ./gradlew) can see it.
#   * iOS requires a macOS runner with Xcode.
#   * A shared Xcode scheme is committed at
#     iosApp/iosApp.xcodeproj/xcshareddata/xcschemes/iosApp.xcscheme so
#     `xcodebuild -scheme iosApp` works on a fresh clone (no auto-generated scheme).

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# A newer push to the same PR/branch cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Android: build + lint + unit tests on Linux. Fast, cheap, runs every PR.
  # ---------------------------------------------------------------------------
  android:
    name: Android (build + lint + unit tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ubuntu-latest already has the Android SDK and exports ANDROID_HOME,
      # but this action guarantees a known-good SDK + accepted licenses and
      # re-exports ANDROID_HOME/ANDROID_SDK_ROOT for the Gradle steps.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      # Lint = Android Gradle Plugin's built-in `lint` (AGP 8.9.3). Chosen over
      # ktlint/detekt to keep the gate lightweight and zero-new-dependency: it
      # ships with the toolchain already pinned in the version catalog, needs no
      # extra plugin/config, and covers both modules. A dedicated Kotlin
      # style/static-analysis tool (detekt) can be layered on in a later story
      # without changing this workflow's shape.
      - name: Lint (Android Gradle Plugin lint)
        run: ./gradlew :androidApp:lintDebug :shared:lintDebug --stacktrace

      # Android/JVM unit tests for the shared module. No tests exist yet
      # (engine lands in Sprint 1) so this passes trivially today — the gate is
      # wired and ready for when tests arrive.
      - name: Unit tests (Android / JVM)
        run: ./gradlew :shared:testDebugUnitTest --stacktrace

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # iOS: link the shared Kotlin framework + xcodebuild the app for a simulator.
  # Must run on macOS. Needs JDK 17 + ANDROID_HOME because the Xcode
  # "Compile Kotlin Framework" run script shells out to ./gradlew.
  # ---------------------------------------------------------------------------
  ios:
    name: iOS (framework link + xcodebuild + unit tests)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # The iOS app's Xcode run script invokes ./gradlew, which configures the
      # Android target too, so the Android SDK must be visible to xcodebuild.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # iOS "build" verification of the shared module: link the debug framework
      # for the simulator arch the runners use (arm64).
      - name: Link shared framework (iOS Simulator arm64)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --stacktrace

      # iOS unit tests (Kotlin/Native). Like Android, none exist yet so this
      # passes trivially; it wires the iOS-side test gate for Sprint 1.
      - name: Unit tests (iOS / Kotlin Native)
        run: ./gradlew :shared:iosSimulatorArm64Test --stacktrace

      # Full app build via the COMMITTED shared scheme. `generic/platform=iOS
      # Simulator` is destination-agnostic (no specific device/OS pinned), which
      # is robust across runner image updates. Code signing is disabled — we only
      # need a compile/link, not a signed installable.
      - name: Build iosApp (xcodebuild, iOS Simulator)
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath iosApp/build/ci-DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7

# -----------------------------------------------------------------------------
# Making "red blocks merge" enforceable (manual GitHub setting — cannot be done
# from a workflow file). After this workflow has run once on a PR so the checks
# are registered, a repo admin must:
#   Settings -> Branches -> Branch protection rules -> add/edit a rule for `main`
#     [x] Require a pull request before merging
#     [x] Require status checks to pass before merging
#         Require these checks (search by the job NAME shown on the PR):
#           - "Android (build + lint + unit tests)"
#           - "iOS (framework link + xcodebuild + unit tests)"
#     [x] (recommended) Require branches to be up to date before merging
# Until those two checks are marked required, GitHub will run them but will not
# block merge on red.
# -----------------------------------------------------------------------------
